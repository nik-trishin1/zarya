services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: zarya
      POSTGRES_PASSWORD: zarya
      POSTGRES_DB: zarya
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zarya"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://zarya:zarya@db:5432/zarya
      BOT_TOKEN: ${BOT_TOKEN:-}
      ADMIN_TELEGRAM_IDS: ${ADMIN_TELEGRAM_IDS:-}
      WEBAPP_URL: ${WEBAPP_URL:-http://localhost:5173}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:8000}
      UPLOAD_DIR: /app/uploads
      CORS_ORIGINS: http://localhost:5173,https://web.telegram.org
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${API_BASE_URL:-http://localhost:8000}
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
